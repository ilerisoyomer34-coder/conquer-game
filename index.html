<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🌍 Ülke Fethet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07071a;--bg2:#0f0f28;--bg3:#17173a;
  --border:#2a2a55;--accent:#6366f1;--accent2:#a78bfa;
  --gold:#f59e0b;--red:#ef4444;--green:#22c55e;--text:#e2e8f0;--text2:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none;}

/* ── TOP BAR ── */
#topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(7,7,26,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
#topbar h1{font-size:16px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;}
.stat{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;}
.stat-icon{font-size:15px;}
#progress-text{margin-left:auto;font-size:12px;color:var(--text2);}

/* ── MAIN LAYOUT ── */
#main{display:grid;grid-template-columns:1fr 280px;gap:12px;padding:12px;max-width:1100px;margin:0 auto;}
@media(max-width:700px){#main{grid-template-columns:1fr;}}

/* ── COUNTRY MAP ── */
#map{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:500px){#map{grid-template-columns:repeat(3,1fr);}}

.country-card{
  background:var(--bg2);border:2px solid var(--border);border-radius:14px;
  padding:10px 8px;cursor:pointer;transition:all .2s;text-align:center;
  position:relative;overflow:hidden;
}
.country-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,.3);}
.country-card.selected{border-color:var(--accent2);background:rgba(99,102,241,.15);
  box-shadow:0 0 20px rgba(167,139,250,.4);}
.country-card.conquered{border-color:#22c55e;background:rgba(34,197,94,.08);}
.country-card.conquered::after{content:'✓';position:absolute;top:4px;right:6px;color:#22c55e;font-weight:900;font-size:12px;}
.country-card.enemy{border-color:#ef4444;background:rgba(239,68,68,.08);}

.c-flag{font-size:26px;display:block;margin-bottom:4px;}
.c-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-pop{font-size:10px;color:var(--text2);margin-bottom:5px;}

.bar-wrap{background:rgba(0,0,0,.3);border-radius:4px;height:5px;margin-bottom:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.bar-love .bar-fill{background:linear-gradient(90deg,#f43f5e,#ec4899);}
.bar-def .bar-fill{background:linear-gradient(90deg,#3b82f6,#6366f1);}
.bar-label{font-size:9px;color:var(--text2);text-align:left;margin-bottom:1px;}

/* ── SIDE PANEL ── */
#side{display:flex;flex-direction:column;gap:10px;}

#info-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;}
#info-box h3{font-size:13px;color:var(--text2);margin-bottom:12px;}
#sel-flag{font-size:48px;text-align:center;display:block;margin-bottom:6px;}
#sel-name{font-size:18px;font-weight:800;text-align:center;margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:8px;}
.info-val{font-weight:700;color:var(--accent2);}
.big-bar{background:rgba(0,0,0,.3);border-radius:6px;height:10px;overflow:hidden;margin-bottom:12px;}
.big-bar-fill{height:100%;border-radius:6px;transition:width .5s ease;}

#btn-bomb{
  width:100%;padding:11px;border-radius:11px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  border:none;color:#fff;font-size:14px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:all .15s;margin-bottom:8px;
}
#btn-bomb:hover{opacity:.85;transform:scale(1.02);}
#btn-bomb:disabled{opacity:.35;cursor:not-allowed;transform:none;}
#btn-love{
  width:100%;padding:9px;border-radius:11px;
  background:linear-gradient(135deg,#ec4899,#be185d);
  border:none;color:#fff;font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
#btn-love:hover{opacity:.85;}
#btn-love:disabled{opacity:.35;cursor:not-allowed;}
#action-msg{font-size:11px;color:var(--text2);text-align:center;margin-top:8px;min-height:16px;}

/* Shop */
#shop-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;}
#shop-box h3{font-size:13px;color:var(--text2);margin-bottom:10px;}
#btn-buy{
  width:100%;padding:10px;border-radius:11px;
  background:linear-gradient(135deg,var(--gold),#d97706);
  border:none;color:#1a1a00;font-size:13px;font-weight:800;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
#btn-buy:hover{opacity:.85;}
#btn-buy:disabled{opacity:.35;cursor:not-allowed;}
.shop-info{font-size:11px;color:var(--text2);margin-top:8px;text-align:center;}

/* ── QUESTION PANEL ── */
#q-panel{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:16px;margin:0 12px 12px;max-width:1100px;margin-left:auto;margin-right:auto;
  position:relative; overflow:hidden;
}
#q-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),#60a5fa);
}
#q-label{font-size:11px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
#q-text{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.5;}
#q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){#q-opts{grid-template-columns:1fr;}}
.opt-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:11px;cursor:pointer;text-align:left;
  font-size:13px;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:8px;
}
.opt-btn:hover:not(:disabled){background:var(--border);border-color:var(--accent);}
.opt-btn.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#86efac;}
.opt-btn.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#fca5a5;}
.opt-btn:disabled{cursor:not-allowed;}
.opt-key{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.opt-btn.correct .opt-key{background:#22c55e;}
.opt-btn.wrong .opt-key{background:#ef4444;}
#q-result{font-size:13px;font-weight:600;margin-top:10px;min-height:20px;text-align:center;}

/* ── TOAST ── */
#toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--bg3);border:1px solid var(--border);border-radius:20px;
  padding:8px 20px;font-size:13px;font-weight:600;
  opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── OVERLAY ── */
#overlay{
  display:none;position:fixed;inset:0;background:rgba(7,7,26,.96);
  z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:20px;
}
#overlay.show{display:flex;}
#ov-emoji{font-size:64px;}
#ov-title{font-size:32px;font-weight:900;}
#ov-sub{font-size:15px;color:var(--text2);max-width:360px;}
#btn-restart{
  background:linear-gradient(135deg,var(--accent),#818cf8);
  border:none;color:#fff;padding:13px 36px;border-radius:28px;
  font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;
}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>🌍 Ülke Fethet</h1>
  <div class="stat"><span class="stat-icon">💰</span><span id="s-gold">0</span> Altın</div>
  <div class="stat"><span class="stat-icon">💣</span><span id="s-bomb">0</span> Bomba</div>
  <div class="stat"><span class="stat-icon">🏳</span><span id="s-count">0</span>/15</div>
  <div id="progress-text">Doğru: <span id="s-correct">0</span></div>
</div>

<!-- Main -->
<div id="main">
  <div id="map"></div>
  <div id="side">
    <div id="info-box">
      <h3>📍 Seçili Ülke</h3>
      <span id="sel-flag">🌐</span>
      <div id="sel-name" style="color:var(--text2)">Haritadan ülke seç</div>
      <div id="sel-stats"></div>
      <button id="btn-bomb" disabled>💣 Bomba At (1 bomba)</button>
      <button id="btn-love" disabled>❤️ Halk Sevgisi Kazan (30 altın)</button>
      <div id="action-msg"></div>
    </div>
    <div id="shop-box">
      <h3>🛒 Market</h3>
      <button id="btn-buy">💣 Bomba Satın Al (50 altın)</button>
      <div class="shop-info">Soruları doğru cevapla → altın kazan → bomba al → ülkeleri fethet!</div>
    </div>
  </div>
</div>

<!-- Question -->
<div id="q-panel">
  <div id="q-label">❓ SORU — Doğru cevapla altın kazan!</div>
  <div id="q-text">Yükleniyor...</div>
  <div id="q-opts"></div>
  <div id="q-result"></div>
</div>

<div id="toast"></div>
<div id="overlay">
  <div id="ov-emoji"></div>
  <div id="ov-title"></div>
  <div id="ov-sub"></div>
  <button id="btn-restart" onclick="initGame()">Tekrar Oyna ↺</button>
</div>

<script>
// ── ÜLKELER ────────────────────────────────────────────────────────────
const COUNTRY_DATA = [
  { id:'turkey',    name:'Türkiye',     flag:'🇹🇷', pop:85,  baseDefense:60, baseLove:80 },
  { id:'germany',   name:'Almanya',     flag:'🇩🇪', pop:84,  baseDefense:70, baseLove:50 },
  { id:'france',    name:'Fransa',      flag:'🇫🇷', pop:68,  baseDefense:65, baseLove:55 },
  { id:'uk',        name:'İngiltere',   flag:'🇬🇧', pop:67,  baseDefense:65, baseLove:50 },
  { id:'russia',    name:'Rusya',       flag:'🇷🇺', pop:145, baseDefense:90, baseLove:30 },
  { id:'usa',       name:'Amerika',     flag:'🇺🇸', pop:335, baseDefense:100,baseLove:35 },
  { id:'china',     name:'Çin',         flag:'🇨🇳', pop:1400,baseDefense:95, baseLove:25 },
  { id:'japan',     name:'Japonya',     flag:'🇯🇵', pop:125, baseDefense:70, baseLove:60 },
  { id:'india',     name:'Hindistan',   flag:'🇮🇳', pop:1400,baseDefense:80, baseLove:45 },
  { id:'brazil',    name:'Brezilya',    flag:'🇧🇷', pop:215, baseDefense:65, baseLove:65 },
  { id:'australia', name:'Avustralya',  flag:'🇦🇺', pop:26,  baseDefense:50, baseLove:70 },
  { id:'egypt',     name:'Mısır',       flag:'🇪🇬', pop:104, baseDefense:55, baseLove:55 },
  { id:'mexico',    name:'Meksika',     flag:'🇲🇽', pop:130, baseDefense:55, baseLove:60 },
  { id:'canada',    name:'Kanada',      flag:'🇨🇦', pop:38,  baseDefense:50, baseLove:75 },
  { id:'safrica',   name:'G. Afrika',   flag:'🇿🇦', pop:60,  baseDefense:45, baseLove:65 },
];

// ── SORULAR ────────────────────────────────────────────────────────────
const QUESTIONS = [
  { q:"Türkiye'nin başkenti neresidir?",          opts:["İstanbul","Ankara","İzmir","Bursa"],             ans:1, reward:25 },
  { q:"Dünyanın en büyük okyanusu hangisidir?",   opts:["Atlantik","Hint","Arktik","Pasifik"],            ans:3, reward:25 },
  { q:"Güneş sistemimizdeki en büyük gezegen?",   opts:["Satürn","Mars","Jüpiter","Neptün"],              ans:2, reward:25 },
  { q:"Su kaç derecede kaynar?",                  opts:["80°C","90°C","100°C","110°C"],                  ans:2, reward:20 },
  { q:"Dünyanın en uzun nehri hangisidir?",        opts:["Amazon","Nil","Yangtze","Mississippi"],         ans:1, reward:30 },
  { q:"Türk lirasının sembolü nedir?",            opts:["€","$","₺","£"],                                ans:2, reward:20 },
  { q:"Bir yılda kaç ay vardır?",                 opts:["10","11","12","13"],                             ans:2, reward:15 },
  { q:"Japonya'nın başkenti hangisidir?",         opts:["Osaka","Kyoto","Tokyo","Hiroshima"],             ans:2, reward:25 },
  { q:"Dünyanın en büyük çölü hangisidir?",       opts:["Gobi","Arabistan","Sahra","Antarktika"],        ans:3, reward:35 },
  { q:"Hızın birimi nedir?",                      opts:["Newton","Joule","m/s","Pascal"],                 ans:2, reward:20 },
  { q:"Hangi element H sembolüyle gösterilir?",   opts:["Helyum","Hidrojen","Hafniyum","Holmiyum"],      ans:1, reward:25 },
  { q:"Osmanlı İmparatorluğu hangi yıl kuruldu?", opts:["1299","1453","1071","1326"],                    ans:0, reward:30 },
  { q:"Ekvator hangi kıtayı tam ortadan böler?",  opts:["Asya","Afrika","Avrupa","Antarktika"],           ans:1, reward:30 },
  { q:"DNA'nın açılımı nedir?",                   opts:["Deoksiribonükleik Asit","Dinükleik Asit","Diribonükleik Asit","Dinitrojen Asit"], ans:0, reward:35 },
  { q:"Ayın Dünya'ya uzaklığı yaklaşık kaçtır?", opts:["38.000 km","384.000 km","3.840.000 km","38.400 km"], ans:1, reward:35 },
  { q:"İtalya'nın başkenti neresidir?",           opts:["Milano","Venedik","Floransa","Roma"],            ans:3, reward:20 },
  { q:"Hangi ülke piramitleriyle ünlüdür?",       opts:["İran","Irak","Mısır","Suriye"],                 ans:2, reward:20 },
  { q:"Dünya'nın en yüksek dağı hangisidir?",     opts:["K2","Everest","Kangchenjunga","Makalu"],        ans:1, reward:25 },
  { q:"Işık hızı saniyede yaklaşık kaçtır?",      opts:["300 km","3.000 km","300.000 km","3.000.000 km"],ans:2, reward:30 },
  { q:"Hangi renk tehlike anlamında kullanılır?", opts:["Mavi","Yeşil","Sarı","Kırmızı"],                ans:3, reward:15 },
  { q:"Bir üçgenin iç açıları toplamı kaçtır?",   opts:["90°","180°","270°","360°"],                    ans:1, reward:25 },
  { q:"Brezilya'nın resmi dili hangisidir?",      opts:["İspanyolca","Portekizce","Fransızca","İngilizce"], ans:1, reward:30 },
  { q:"Hangi hayvan 'ormanın kralı' olarak bilinir?", opts:["Kaplan","Leopar","Çita","Aslan"],           ans:3, reward:20 },
  { q:"Türkiye'nin yüzölçümü yaklaşık kaçtır?",  opts:["581.000 km²","781.000 km²","681.000 km²","481.000 km²"], ans:1, reward:30 },
  { q:"Hangi gezegen Güneş'e en yakındır?",       opts:["Venüs","Mars","Merkür","Dünya"],                ans:2, reward:30 },
  { q:"Bir dikdörtgenin alanı nasıl hesaplanır?", opts:["Çevre×2","Kenar³","Uzunluk×Genişlik","Kenar²"], ans:2, reward:25 },
  { q:"İnsan vücudunda kaç kemik vardır?",        opts:["106","206","306","406"],                         ans:1, reward:30 },
  { q:"Hangi ülkenin bayrağında ay ve yıldız var?",opts:["Yunanistan","Türkiye","Portekiz","İsveç"],     ans:1, reward:20 },
  { q:"Avustralya hangi okyanus üzerindedir?",    opts:["Atlantik","Hint","Arktik","Pasifik"],            ans:3, reward:25 },
  { q:"Kanada'nın başkenti neresidir?",           opts:["Toronto","Vancouver","Ottawa","Montreal"],       ans:2, reward:30 },
  { q:"Fotosentez sırasında bitkiler ne üretir?", opts:["CO₂","Azot","Oksijen","Hidrojen"],              ans:2, reward:25 },
  { q:"Hangi yıl Türkiye Cumhuriyeti kuruldu?",   opts:["1919","1920","1922","1923"],                    ans:3, reward:25 },
  { q:"Dünyanın en küçük ülkesi hangisidir?",     opts:["Monako","San Marino","Vatikan","Liechtenstein"], ans:2, reward:35 },
  { q:"Renk körü bireyler hangi renkleri karıştırır?", opts:["Mavi-Sarı","Kırmızı-Yeşil","Mor-Turuncu","Beyaz-Siyah"], ans:1, reward:30 },
  { q:"Su molekülünün kimyasal formülü nedir?",   opts:["CO₂","H₂O","NaCl","O₂"],                       ans:1, reward:20 },
];

// ── OYUN DURUMU ────────────────────────────────────────────────────────
let countries=[], gold=0, bombs=0, selected=null, qIndex=0, correctCount=0, qAnswered=false;

function initGame(){
  document.getElementById('overlay').classList.remove('show');
  gold=100; bombs=2; selected=null; correctCount=0;

  countries = COUNTRY_DATA.map(d=>({
    ...d,
    defense: d.baseDefense,
    love: d.baseLove,
    conquered: false
  }));

  shuffle(QUESTIONS);
  qIndex=0; qAnswered=false;

  renderMap();
  showQuestion();
  updateStats();
  selectCountry(null);
  document.getElementById('action-msg').textContent='';
}

// ── MAP ────────────────────────────────────────────────────────────────
function renderMap(){
  const map=document.getElementById('map');
  map.innerHTML='';
  countries.forEach(c=>{
    const div=document.createElement('div');
    div.className='country-card'+(c.conquered?' conquered':'');
    div.id='card-'+c.id;
    div.onclick=()=>selectCountry(c);
    div.innerHTML=`
      <span class="c-flag">${c.flag}</span>
      <div class="c-name">${c.name}</div>
      <div class="c-pop">👥 ${c.pop >= 1000 ? (c.pop/1000).toFixed(1)+'B' : c.pop+'M'}</div>
      <div class="bar-label">❤️ Halk Sevgisi</div>
      <div class="bar-wrap bar-love"><div class="bar-fill" style="width:${c.love}%;background:${loveColor(c.love)}"></div></div>
      <div class="bar-label">🛡 Savunma</div>
      <div class="bar-wrap bar-def"><div class="bar-fill" style="width:${(c.defense/c.baseDefense)*100}%"></div></div>
    `;
    map.appendChild(div);
  });
}

function updateCard(c){
  const div=document.getElementById('card-'+c.id);
  if(!div) return;
  div.className='country-card'+(c.conquered?' conquered':'')+(selected===c?' selected':'');
  div.querySelector('.bar-wrap.bar-love .bar-fill').style.width=c.love+'%';
  div.querySelector('.bar-wrap.bar-love .bar-fill').style.background=loveColor(c.love);
  div.querySelector('.bar-wrap.bar-def .bar-fill').style.width=(c.defense/c.baseDefense*100)+'%';
}

function loveColor(v){
  if(v>=70) return 'linear-gradient(90deg,#ec4899,#f43f5e)';
  if(v>=40) return 'linear-gradient(90deg,#f97316,#ef4444)';
  return 'linear-gradient(90deg,#6b7280,#ef4444)';
}

// ── SELECT COUNTRY ─────────────────────────────────────────────────────
function selectCountry(c){
  if(selected){
    const old=document.getElementById('card-'+selected.id);
    if(old) old.classList.remove('selected');
  }
  selected=c;
  if(c){
    const el=document.getElementById('card-'+c.id);
    if(el) el.classList.add('selected');
  }

  const bombBtn=document.getElementById('btn-bomb');
  const loveBtn=document.getElementById('btn-love');

  if(!c){
    document.getElementById('sel-flag').textContent='🌐';
    document.getElementById('sel-name').textContent='Haritadan ülke seç';
    document.getElementById('sel-name').style.color='var(--text2)';
    document.getElementById('sel-stats').innerHTML='';
    bombBtn.disabled=true; loveBtn.disabled=true;
    return;
  }

  document.getElementById('sel-flag').textContent=c.flag;
  document.getElementById('sel-name').textContent=c.name;
  document.getElementById('sel-name').style.color='var(--text)';

  const defPct=Math.round(c.defense/c.baseDefense*100);
  document.getElementById('sel-stats').innerHTML=`
    <div class="info-row"><span>👥 Nüfus</span><span class="info-val">${c.pop >= 1000 ? (c.pop/1000).toFixed(1)+'B' : c.pop+'M'}</span></div>
    <div class="info-row"><span>❤️ Halk Sevgisi</span><span class="info-val" style="color:${c.love>=70?'#f43f5e':c.love>=40?'#f97316':'#6b7280'}">${c.love}%</span></div>
    <div class="bar-label" style="font-size:11px;color:var(--text2);margin-bottom:4px;">🛡 Savunma: ${c.defense}/${c.baseDefense}</div>
    <div class="big-bar" style="margin-bottom:12px">
      <div class="big-bar-fill" style="width:${defPct}%;background:linear-gradient(90deg,#3b82f6,#6366f1)"></div>
    </div>
    ${c.conquered ? '<div style="color:#22c55e;font-weight:700;font-size:13px;text-align:center;margin-bottom:8px">✅ Bu ülke senin!</div>' : ''}
  `;

  bombBtn.disabled = c.conquered || bombs<=0;
  loveBtn.disabled = c.conquered || gold<30;
  document.getElementById('action-msg').textContent=
    c.conquered ? '✅ Fethedildi!' :
    bombs<=0 ? '💣 Bomban yok — Market\'ten satın al!' : '';
}

// ── ACTIONS ────────────────────────────────────────────────────────────
document.getElementById('btn-bomb').onclick=function(){
  if(!selected||selected.conquered||bombs<=0) return;
  bombs--;

  // Damage based on love: yüksek sevgi = daha az direniş
  let dmg;
  if(selected.love>=70)      dmg=25+Math.floor(Math.random()*10); // 25-34
  else if(selected.love>=40) dmg=15+Math.floor(Math.random()*10); // 15-24
  else                       dmg=8+Math.floor(Math.random()*8);  // 8-15

  selected.defense=Math.max(0,selected.defense-dmg);
  selected.love=Math.max(0,selected.love-8);

  showMsg(`💥 ${dmg} hasar verdi! Savunma: ${selected.defense}`,'#f97316');

  if(selected.defense<=0){
    conquer(selected);
  } else {
    updateCard(selected);
    selectCountry(selected);
    updateStats();
  }
};

document.getElementById('btn-love').onclick=function(){
  if(!selected||selected.conquered||gold<30) return;
  gold-=30;
  const gain=10+Math.floor(Math.random()*11); // 10-20
  selected.love=Math.min(100,selected.love+gain);
  updateCard(selected);
  selectCountry(selected);
  updateStats();
  showMsg(`❤️ Halk sevgisi +${gain}! Şimdi bombalar daha etkili!`,'#ec4899');
};

document.getElementById('btn-buy').onclick=function(){
  if(gold<50) return showMsg('💸 Yeterli altın yok!','#ef4444');
  gold-=50; bombs++;
  updateStats();
  showMsg('💣 Bomba satın alındı!','#f59e0b');
  if(selected) selectCountry(selected);
};

function conquer(c){
  c.conquered=true;
  c.defense=0;
  const income=Math.max(20,Math.floor(c.pop/10));
  gold+=income;
  updateCard(c);
  selectCountry(c);
  updateStats();
  showMsg(`🎉 ${c.name} fethedildi! +${income} altın kazandın!`,'#22c55e');
  toast(`🏳 ${c.name} artık senindir! 🎉`);

  const conquered=countries.filter(x=>x.conquered).length;
  if(conquered===countries.length){
    setTimeout(()=>{
      document.getElementById('ov-emoji').textContent='🏆';
      document.getElementById('ov-title').textContent='Kazandınız!';
      document.getElementById('ov-sub').textContent=`Tüm 15 ülkeyi fethettiniz! ${correctCount} soruyu doğru cevapladınız.`;
      document.getElementById('overlay').classList.add('show');
    },800);
  }
}

// ── QUESTION ───────────────────────────────────────────────────────────
function showQuestion(){
  qAnswered=false;
  const q=QUESTIONS[qIndex%QUESTIONS.length];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-result').textContent='';

  const opts=document.getElementById('q-opts');
  opts.innerHTML='';
  const keys=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-key">${keys[i]}</span>${opt}`;
    btn.onclick=()=>answer(i);
    opts.appendChild(btn);
  });
}

function answer(idx){
  if(qAnswered) return;
  qAnswered=true;
  const q=QUESTIONS[qIndex%QUESTIONS.length];
  const btns=document.querySelectorAll('.opt-btn');

  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===q.ans) b.classList.add('correct');
    else if(i===idx && idx!==q.ans) b.classList.add('wrong');
  });

  if(idx===q.ans){
    gold+=q.reward;
    correctCount++;
    document.getElementById('q-result').textContent=`✅ Doğru! +${q.reward} altın kazandın!`;
    document.getElementById('q-result').style.color='#86efac';
    toast(`+${q.reward} 💰 Doğru cevap!`);
  } else {
    document.getElementById('q-result').textContent=`❌ Yanlış! Doğru cevap: ${q.opts[q.ans]}`;
    document.getElementById('q-result').style.color='#fca5a5';
  }

  updateStats();
  if(selected) selectCountry(selected);
  qIndex++;
  setTimeout(showQuestion, 1800);
}

// ── UI HELPERS ─────────────────────────────────────────────────────────
function updateStats(){
  document.getElementById('s-gold').textContent=gold;
  document.getElementById('s-bomb').textContent=bombs;
  document.getElementById('s-count').textContent=countries.filter(c=>c.conquered).length;
  document.getElementById('s-correct').textContent=correctCount;
  document.getElementById('btn-buy').disabled=gold<50;
}

function showMsg(msg, color){
  const el=document.getElementById('action-msg');
  el.textContent=msg;
  el.style.color=color||'var(--text2)';
}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }

// Start
initGame();
</script>
